<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 1rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0,212,255,0.1);
        }
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { transform: scale(1.05); }
        .todos-list { list-style: none; }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .todo-item:hover { border-color: #00d4ff; background: #2a2a2a; }
        .todo-item.completed .todo-title {
            text-decoration: line-through;
            color: #888;
        }
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #00d4ff;
        }
        .todo-title { flex: 1; color: #e0e0e0; }
        .delete-btn {
            padding: 8px 12px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .delete-btn:hover { opacity: 0.8; }
        .empty { text-align: center; color: #888; padding: 40px 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Todos</h1>
        <p class="subtitle">Express + PostgreSQL на Railway</p>
        <div class="input-group">
            <input type="text" id="input" placeholder="Додай завдання..." autocomplete="off">
            <button onclick="add()">Додати</button>
        </div>
        <ul class="todos-list" id="list"></ul>
        <div class="empty" id="empty" style="display:none">Немає завдань</div>
    </div>
    <script>
        const API = '/api/todos';

        async function load() {
            try {
                const res = await fetch(API);
                const todos = await res.json();
                const list = document.getElementById('list');
                const empty = document.getElementById('empty');

                if (todos.length === 0) {
                    list.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';
                list.innerHTML = todos.map(t => `
                    <li class="todo-item ${t.completed ? 'completed' : ''}">
                        <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggle(${t.id}, this.checked)">
                        <span class="todo-title">${t.title}</span>
                        <button class="delete-btn" onclick="del(${t.id})">Видалити</button>
                    </li>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function add() {
            const val = document.getElementById('input').value.trim();
            if (!val) return;
            try {
                await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: val })
                });
                document.getElementById('input').value = '';
                load();
            } catch (e) { console.error(e); }
        }

        async function toggle(id, done) {
            try {
                await fetch(`${API}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: done })
                });
                load();
            } catch (e) { console.error(e); }
        }

        async function del(id) {
            try {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                load();
            } catch (e) { console.error(e); }
        }

        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') add();
        });

        load();
    </script>
</body>
</html>
